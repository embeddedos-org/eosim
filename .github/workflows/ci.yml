name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ─── Lint & Format ──────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check eosim/ --output-format=github
      - name: Ruff format check
        run: ruff format --check eosim/

  # ─── Unit Tests (multi-Python) ──────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short --junitxml=test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

  # ─── Code Coverage ─────────────────────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          python -m pytest tests/unit/ \
            --cov=eosim \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v --tb=short
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
      - name: Coverage summary
        if: always()
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          python -m pytest tests/unit/ --cov=eosim --cov-report=term 2>/dev/null | tail -30 >> $GITHUB_STEP_SUMMARY || true

  # ─── Platform Validation ───────────────────────────────────────────
  validate-platforms:
    name: Validate Platforms
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Validate all platform YAML files
        run: |
          python -c "
          import os, yaml, sys
          from eosim.core.schema import validate_platform

          platforms_dir = 'platforms'
          errors = []
          count = 0

          for name in sorted(os.listdir(platforms_dir)):
              yml = os.path.join(platforms_dir, name, 'platform.yml')
              if not os.path.isfile(yml):
                  continue
              count += 1
              with open(yml) as f:
                  data = yaml.safe_load(f)
              errs = validate_platform(data)
              if errs:
                  errors.append(f'{name}: {errs}')

          print(f'Validated {count} platforms')
          if errors:
              print(f'ERRORS ({len(errors)}):')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          print('All platforms valid!')
          "
      - name: Platform count check
        run: |
          count=$(ls -d platforms/*/platform.yml 2>/dev/null | wc -l)
          echo "Platform count: $count"
          if [ "$count" -lt 100 ]; then
            echo "::warning::Platform count ($count) is below 100"
          fi
          echo "## Platform Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Platforms validated: **$count**" >> $GITHUB_STEP_SUMMARY

  # ─── Simulator Smoke Test ──────────────────────────────────────────
  simulator-smoke:
    name: Simulator Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Smoke test all simulators
        run: |
          python -c "
          from eosim.engine.native.simulators import SIMULATOR_MAP, SimulatorFactory

          class FakeVM:
              def __init__(self):
                  self.peripherals = {}
              def add_peripheral(self, name, dev):
                  self.peripherals[name] = dev

          print(f'Testing {len(SIMULATOR_MAP)} simulator mappings...')
          failed = []
          for product_type in sorted(SIMULATOR_MAP.keys()):
              try:
                  vm = FakeVM()
                  sim = SimulatorFactory.create(product_type, vm)
                  for _ in range(10):
                      sim.tick()
                  state = sim.get_state()
                  assert isinstance(state, dict)
                  sim.reset()
              except Exception as e:
                  failed.append(f'{product_type}: {e}')

          if failed:
              print(f'FAILED ({len(failed)}):')
              for f in failed:
                  print(f'  - {f}')
              exit(1)
          print(f'All {len(SIMULATOR_MAP)} simulators passed smoke test!')
          "

  # ─── Documentation Build ───────────────────────────────────────────
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz
      - name: Build HTML docs
        run: |
          cd docs
          doxygen Doxyfile 2>&1 | tail -5
          echo "## Documentation Build" >> $GITHUB_STEP_SUMMARY
          echo "- HTML pages: $(find output/html -name '*.html' 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/output/html/

  # ─── Security Scan ─────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pip-audit safety
      - name: Pip audit
        run: pip install -e "." && pip-audit --strict 2>/dev/null || true
      - name: Check for hardcoded secrets
        run: |
          # Simple grep for common secret patterns
          if grep -rn "password\s*=" eosim/ --include="*.py" | grep -v "# " | grep -v "test" | grep -v "''" | head -5; then
            echo "::warning::Potential hardcoded credentials found"
          fi

  # ─── Package Build ─────────────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, coverage, validate-platforms, simulator-smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Check package
        run: twine check dist/*
      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Package summary
        run: |
          echo "## Package Build" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la dist/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─── CI Summary ────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, coverage, validate-platforms, simulator-smoke, docs, security, build]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform Validation | ${{ needs.validate-platforms.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Simulator Smoke | ${{ needs.simulator-smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.docs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
